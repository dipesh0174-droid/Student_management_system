{% extends "base.html" %}
{% block title %}Statistics{% endblock %}
{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h2><i class="fas fa-chart-bar"></i> Analytics Dashboard</h2>
        <p class="text-muted">Student performance overview</p>
    </div>
</div>

<div class="row g-4 mb-5">
    <div class="col-xl-3 col-md-6">
        <div class="card bg-primary text-white shadow h-100">
            <div class="card-body">
                <div class="row">
                    <div class="col">
                        <div class="text-white-50 small">Total Students</div>
                        <div class="h4 mb-0 font-weight-bold">{{ total }}</div>
                    </div>
                    <div class="col-auto align-self-center">
                        <i class="fas fa-users fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-xl-3 col-md-6">
        <div class="card bg-success text-white shadow h-100">
            <div class="card-body">
                <div class="row">
                    <div class="col">
                        <div class="text-white-50 small">Average Marks</div>
                        <div class="h4 mb-0 font-weight-bold">{{ avg_marks }}</div>
                    </div>
                    <div class="col-auto align-self-center">
                        <i class="fas fa-chart-line fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-xl-3 col-md-6">
        <div class="card bg-warning text-dark shadow h-100">
            <div class="card-body">
                <div class="row">
                    <div class="col">
                        <div class="text-muted small">A+ Students</div>
                        <div class="h4 mb-0 font-weight-bold text-warning">15+</div>
                    </div>
                    <div class="col-auto align-self-center">
                        <i class="fas fa-star fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-xl-3 col-md-6">
        <div class="card bg-info text-white shadow h-100">
            <div class="card-body">
                <div class="row">
                    <div class="col">
                        <div class="text-white-50 small">Pass Rate</div>
                        <div class="h4 mb-0 font-weight-bold">95%</div>
                    </div>
                    <div class="col-auto align-self-center">
                        <i class="fas fa-check-circle fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <a href="{{ url_for('students_view') }}" class="btn btn-primary btn-lg">
            <i class="fas fa-users"></i> Manage Students
        </a>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-lg ms-2">
            <i class="fas fa-home"></i> Dashboard
        </a>
    </div>
</div>
{% endblock %}
